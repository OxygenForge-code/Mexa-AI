<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Mexa AI — Web'i Anlayan Yapay Zeka</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at 30% 20%, #1e1b4b 0%, #0f0d1a 70%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #e2e8f0;
    }

    .app-container {
      width: 100%;
      max-width: 850px;
      height: 92vh;
      background: rgba(15, 13, 26, 0.65);
      backdrop-filter: blur(28px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 38px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      transition: all 0.3s ease;
    }

    /* HEADER */
    .header {
      padding: 22px 28px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 10px 24px rgba(124, 58, 237, 0.45);
      animation: softPulse 2s infinite alternate;
    }

    @keyframes softPulse {
      0% { box-shadow: 0 10px 24px rgba(124, 58, 237, 0.45); }
      100% { box-shadow: 0 14px 28px rgba(139, 92, 246, 0.7); }
    }

    .brand h1 {
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: -0.4px;
      background: linear-gradient(135deg, #ddd6fe, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status-badge {
      background: rgba(255, 255, 255, 0.05);
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #c4b5fd;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 12px #10b981;
    }

    /* CHAT AREA */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar {
      width: 6px;
    }
    .chat-area::-webkit-scrollbar-track {
      background: transparent;
    }
    .chat-area::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
    }

    .message {
      display: flex;
      gap: 10px;
      animation: slideIn 0.35s cubic-bezier(0.21, 1.02, 0.73, 1);
    }

    .message.user {
      justify-content: flex-end;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-bubble {
      max-width: 82%;
      padding: 14px 20px;
      border-radius: 22px;
      line-height: 1.55;
      font-size: 0.95rem;
      word-break: break-word;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #f1f5f9;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
      transition: all 0.2s;
    }

    .message.user .message-bubble {
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .message.assistant .message-bubble {
      background: rgba(30, 27, 75, 0.8);
      border-left: 4px solid #a78bfa;
      border-bottom-left-radius: 6px;
    }

    .message-bubble a {
      color: #c4b5fd;
      text-decoration: underline;
    }

    .message-bubble p {
      margin: 6px 0;
    }

    .message-bubble ul, .message-bubble ol {
      margin: 6px 0;
      padding-left: 20px;
    }

    /* TYPING INDICATOR */
    .typing-indicator {
      display: flex;
      gap: 6px;
      padding: 12px 16px;
    }
    .typing-indicator span {
      width: 9px;
      height: 9px;
      background: #a78bfa;
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-9px); }
    }

    /* INPUT AREA */
    .input-area {
      padding: 18px 24px 22px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
      display: flex;
      align-items: flex-end;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 26px;
      backdrop-filter: blur(12px);
      transition: 0.25s;
    }

    .input-wrapper:focus-within {
      border-color: #7c3aed;
      box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.25);
    }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      padding: 14px 18px;
      resize: none;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      max-height: 140px;
      min-height: 48px;
      line-height: 1.5;
    }

    textarea::placeholder {
      color: #6b7280;
    }

    .send-btn {
      background: #7c3aed;
      border: none;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 8px 22px rgba(124, 58, 237, 0.5);
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: #8b5cf6;
      transform: scale(1.05);
      box-shadow: 0 10px 28px rgba(139, 92, 246, 0.7);
    }

    .send-btn:active {
      transform: scale(0.96);
    }

    .send-btn svg {
      width: 24px;
      height: 24px;
      stroke: white;
    }

    .footer-note {
      text-align: center;
      padding: 6px 0 8px;
      font-size: 0.7rem;
      color: #4b5563;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="brand">
        <div class="brand-icon">🧠</div>
        <h1>Mexa AI</h1>
      </div>
      <div class="status-badge">
        <span class="status-dot"></span> DeepSeek API Aktif
      </div>
    </header>

    <div class="chat-area" id="chatArea">
      <div class="message assistant">
        <div class="message-bubble">
          👋 Merhaba! Ben <strong>Mexa AI</strong>. Bana bir web sitesi linki gönder, içeriğini okuyup analiz edeyim. Örneğin: <em>"bu siteyi özetle https://example.com"</em>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="userInput" rows="1" placeholder="Mesaj yaz veya link yapıştır..."></textarea>
      </div>
      <button class="send-btn" id="sendBtn" title="Gönder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M22 2L11 13"></path>
          <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
        </svg>
      </button>
    </div>
    <div class="footer-note">Mexa AI · Linkleri algılar, siteleri okur.</div>
  </div>

  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (function() {
      // ⚠️ KENDİ DEEPSEEK API ANAHTARINI BURAYA YAPIŞTIR ⚠️
      const DEEPSEEK_API_KEY = 'BU_RAYA_KENDI_API_ANAHTARINIZI_GIRIN'; 
      // Örnek: 'sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx'

      const DEEPSEEK_API_URL = 'https://api.deepseek.com/v1/chat/completions';
      const CORS_PROXY = 'https://corsproxy.io/?';

      const chatArea = document.getElementById('chatArea');
      const userInput = document.getElementById('userInput');
      const sendBtn = document.getElementById('sendBtn');

      // Enter ile gönder, Shift+Enter alt satır
      userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // Otomatik yükseklik ayarı
      userInput.addEventListener('input', () => {
        userInput.style.height = 'auto';
        userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
      });

      sendBtn.addEventListener('click', sendMessage);

      function scrollToBottom() {
        chatArea.scrollTop = chatArea.scrollHeight;
      }

      function addMessage(role, content) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        
        if (role === 'assistant') {
          bubble.innerHTML = marked.parse(content, { breaks: true });
        } else {
          bubble.textContent = content;
        }
        
        msgDiv.appendChild(bubble);
        chatArea.appendChild(msgDiv);
        scrollToBottom();
        return bubble;
      }

      function showTyping() {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message assistant';
        typingDiv.id = 'typingIndicator';
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        const dots = document.createElement('div');
        dots.className = 'typing-indicator';
        dots.innerHTML = '<span></span><span></span><span></span>';
        bubble.appendChild(dots);
        typingDiv.appendChild(bubble);
        chatArea.appendChild(typingDiv);
        scrollToBottom();
      }

      function hideTyping() {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
      }

      async function fetchWebsiteContent(url) {
        try {
          const response = await fetch(CORS_PROXY + encodeURIComponent(url));
          if (!response.ok) throw new Error('Siteye erişilemedi');
          const html = await response.text();
          let text = html
            .replace(/<script[^>]*>[\s\S]*?<\/script>/gi, ' ')
            .replace(/<style[^>]*>[\s\S]*?<\/style>/gi, ' ')
            .replace(/<[^>]+>/g, ' ')
            .replace(/&nbsp;/g, ' ')
            .replace(/\s{2,}/g, ' ')
            .trim()
            .substring(0, 7000);
          return text;
        } catch (error) {
          console.error('Site okuma hatası:', error);
          throw new Error('Site içeriği alınamadı. Bağlantıyı kontrol et.');
        }
      }

      async function callDeepSeek(messages) {
        const response = await fetch(DEEPSEEK_API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
          },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: messages,
            temperature: 0.75,
            max_tokens: 1500
          })
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.error?.message || `API hatası (${response.status})`);
        }

        const data = await response.json();
        return data.choices[0].message.content;
      }

      function extractUrl(text) {
        const urlRegex = /(https?:\/\/[^\s]+)/gi;
        const match = text.match(urlRegex);
        return match ? match[0] : null;
      }

      async function sendMessage() {
        const rawMessage = userInput.value.trim();
        if (!rawMessage) return;

        if (DEEPSEEK_API_KEY === 'BU_RAYA_KENDI_API_ANAHTARINIZI_GIRIN' || DEEPSEEK_API_KEY.length < 20) {
          addMessage('assistant', '⚠️ Lütfen `DEEPSEEK_API_KEY` değişkenine kendi geçerli DeepSeek API anahtarını gir.');
          return;
        }

        // Kullanıcı mesajını ekle
        addMessage('user', rawMessage);
        userInput.value = '';
        userInput.style.height = 'auto';

        showTyping();

        try {
          const url = extractUrl(rawMessage);
          let messages;

          if (url) {
            const siteContent = await fetchWebsiteContent(url);
            const questionWithoutUrl = rawMessage.replace(url, '').trim() || 'Bu web sitesini özetler misin?';
            
            const systemPrompt = `Sen Mexa AI, web sitelerini analiz eden bir asistansın. Aşağıda bir web sitesinin metin içeriği var. Kullanıcının sorusunu bu içeriğe dayanarak yanıtla. Soru yoksa siteyi detaylıca özetle, başlıklar halinde anlat. Yanıtların Türkçe olsun.`;
            const userContent = `SİTE İÇERİĞİ:\n"""\n${siteContent}\n"""\n\nKULLANICI SORUSU: ${questionWithoutUrl}`;

            messages = [
              { role: "system", content: systemPrompt },
              { role: "user", content: userContent }
            ];
          } else {
            // Normal sohbet
            const systemPrompt = "Sen Mexa AI, yardımcı, samimi ve detaylı bir asistansın. Kullanıcıya Türkçe yanıt ver. Gerektiğinde listeler, başlıklar kullanarak açıklayıcı ol.";
            messages = [
              { role: "system", content: systemPrompt },
              { role: "user", content: rawMessage }
            ];
          }

          const reply = await callDeepSeek(messages);
          hideTyping();
          addMessage('assistant', reply);
        } catch (error) {
          hideTyping();
          addMessage('assistant', `❌ Hata: ${error.message}`);
        }
      }
    })();
  </script>
</body>
</html>
