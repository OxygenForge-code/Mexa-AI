<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Mexa AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0b1a;
      color: #e1e1e1;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #app {
      width: 100%;
      max-width: 880px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0f0f23;
      box-shadow: 0 0 60px rgba(100, 100, 255, 0.12);
    }
    .topbar {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      background: #12122a;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #b794f4, #7f5af0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-right: auto;
    }
    .status {
      font-size: 0.8rem;
      color: #a0a0c0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 8px; height: 8px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; box-shadow: 0 0 8px #10b981; }
      100% { opacity: 0.6; }
    }
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .message {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.35s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user { justify-content: flex-end; }
    .avatar {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .assistant .avatar { background: #2d2d5e; }
    .user .avatar { background: #4a3b8b; }
    .bubble {
      max-width: 70%;
      padding: 14px 20px;
      border-radius: 18px;
      line-height: 1.6;
      font-size: 0.95rem;
      word-wrap: break-word;
    }
    .assistant .bubble {
      background: #1a1a33;
      border: 1px solid rgba(255,255,255,0.06);
      border-bottom-left-radius: 4px;
    }
    .user .bubble {
      background: #3b2b6b;
      border-bottom-right-radius: 4px;
      color: #fff;
    }
    .bubble a { color: #b794f4; }
    .bubble p { margin: 0.5em 0; }
    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .action-chip {
      background: rgba(123, 97, 255, 0.15);
      border: 1px solid rgba(123, 97, 255, 0.4);
      color: #c4b5fd;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-chip:hover {
      background: #7b61ff;
      color: white;
    }
    .typing-bubble {
      display: flex;
      gap: 4px;
      padding: 8px;
    }
    .typing-bubble span {
      width: 8px; height: 8px;
      background: #7f5af0;
      border-radius: 50%;
      animation: wave 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes wave {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: #12122a;
      display: flex;
      gap: 10px;
    }
    .input-area textarea {
      flex: 1;
      background: #1a1a33;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 14px 18px;
      resize: none;
      color: white;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      max-height: 120px;
    }
    .input-area textarea:focus {
      border-color: #7b61ff;
      box-shadow: 0 0 0 3px rgba(123, 97, 255, 0.2);
    }
    .send-btn {
      background: #7b61ff;
      border: none;
      width: 48px; height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      color: white;
      font-size: 20px;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #9b8aff; }
    .send-btn:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="logo">🧠 Mexa AI</div>
      <div class="status"><span class="status-dot"></span> Çevrimiçi</div>
    </div>
    <div class="chat-container" id="chatContainer"></div>
    <div class="input-area">
      <textarea id="userInput" rows="1" placeholder="Link yapıştır veya bir şey sor..."></textarea>
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // Hoş geldin mesajı
    addMessage('assistant', "👋 Merhaba! Ben **Mexa AI**. Bana bir web sitesi linki gönder, içeriğini okuyayım, dosyalarını inceleyeyim. Doğrudan sohbet de edebiliriz.");

    userInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    });

    function addMessage(role, content, actions = null) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'assistant' ? '🤖' : '👤';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      if (role === 'assistant') {
        bubble.innerHTML = marked.parse(content, { breaks: true });
      } else {
        bubble.textContent = content;
      }
      if (actions) {
        const row = document.createElement('div');
        row.className = 'action-row';
        actions.forEach(a => {
          const chip = document.createElement('span');
          chip.className = 'action-chip';
          chip.textContent = a.label;
          chip.onclick = a.handler;
          row.appendChild(chip);
        });
        bubble.appendChild(row);
      }
      div.appendChild(avatar);
      div.appendChild(bubble);
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.id = 'typingIndicator';
      div.innerHTML = `<div class="avatar">🤖</div><div class="bubble"><div class="typing-bubble"><span></span><span></span><span></span></div></div>`;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function hideTyping() {
      document.getElementById('typingIndicator')?.remove();
    }

    async function api(endpoint, body) {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      let data;
      try {
        data = await res.json();
      } catch {
        throw new Error('Sunucudan geçersiz yanıt alındı.');
      }
      if (!res.ok) {
        throw new Error(data.error || `Hata (${res.status})`);
      }
      return data;
    }

    function extractUrl(text) {
      const match = text.match(/(https?:\/\/[^\s]+)/gi);
      return match ? match[0] : null;
    }

    async function sendMessage() {
      const raw = userInput.value.trim();
      if (!raw) return;
      addMessage('user', raw);
      userInput.value = '';
      userInput.style.height = 'auto';
      showTyping();

      try {
        const url = extractUrl(raw);
        if (url) {
          const { content } = await api('/fetch-site', { url });
          const question = raw.replace(url, '').trim() || 'Bu web sitesini detaylı özetle.';
          const { reply } = await api('/ask-ai', {
            messages: [
              { role: 'system', content: 'Sen Mexa AI, web analiz uzmanısın. Türkçe yanıt ver.' },
              { role: 'user', content: `Site içeriği:\n"""\n${content}\n"""\n\nSoru: ${question}` }
            ]
          });
          hideTyping();
          addMessage('assistant', reply, [
            { label: '🔍 script.js incele', handler: () => analyzeFile(url, '/script.js') },
            { label: '🎨 style.css incele', handler: () => analyzeFile(url, '/style.css') }
          ]);
        } else {
          const { reply } = await api('/ask-ai', {
            messages: [
              { role: 'system', content: 'Sen Mexa AI, yardımcı bir asistansın. Türkçe, samimi yanıt ver.' },
              { role: 'user', content: raw }
            ]
          });
          hideTyping();
          addMessage('assistant', reply);
        }
      } catch (err) {
        hideTyping();
        addMessage('assistant', `❌ **Hata:** ${err.message}`);
      }
    }

    async function analyzeFile(baseUrl, fileName) {
      const fileUrl = baseUrl.replace(/\/$/, '') + fileName;
      showTyping();
      try {
        const { content, type } = await api('/fetch-file', { url: fileUrl });
        const { reply } = await api('/ask-ai', {
          messages: [
            { role: 'system', content: 'Sen bir kod analiz uzmanısın. Dosyayı inceleyip işlevini açıkla.' },
            { role: 'user', content: `Dosya: ${fileName}\nTür: ${type}\n\`\`\`\n${content}\n\`\`\`\nBu dosyayı analiz et.` }
          ]
        });
        hideTyping();
        addMessage('assistant', `**📄 ${fileName} Analizi:**\n\n${reply}`);
      } catch (err) {
        hideTyping();
        addMessage('assistant', `⚠️ ${fileName} alınamadı: ${err.message}`);
      }
    }
  </script>
</body>
</html>
