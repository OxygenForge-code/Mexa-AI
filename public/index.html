<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Mexa AI — Derin Web Analizi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }
    /* Hareketli arka plan */
    #bgCanvas {
      position: fixed;
      top:0; left:0; width:100%; height:100%;
      z-index: 0;
      pointer-events: none;
    }
    .app-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 880px;
      height: 90vh;
      background: rgba(15, 13, 35, 0.75);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 42px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 35px 80px rgba(0,0,0,0.7), inset 0 0 30px rgba(139,92,246,0.1);
      animation: containerAppear 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    }
    @keyframes containerAppear {
      0% { opacity:0; transform: scale(0.95) translateY(20px); }
      100% { opacity:1; transform: scale(1) translateY(0); }
    }
    /* Header */
    .header {
      padding: 20px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.02);
    }
    .brand { display:flex; align-items:center; gap:14px; }
    .brand-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      border-radius: 16px;
      display: flex;
      align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 12px 28px rgba(124,58,237,0.6);
      animation: floatIcon 3s infinite alternate ease-in-out;
    }
    @keyframes floatIcon {
      0% { transform: translateY(0px) rotate(0deg); }
      100% { transform: translateY(-6px) rotate(2deg); }
    }
    .brand h1 {
      font-weight: 700; font-size: 2rem;
      background: linear-gradient(135deg, #e0d6ff, #b39df5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .status-pill {
      background: rgba(124,58,237,0.15);
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 0.85rem; font-weight: 500;
      color: #c4b5fd;
      border: 1px solid rgba(124,58,237,0.3);
      display: flex; align-items:center; gap:8px;
      backdrop-filter: blur(10px);
    }
    .status-pulse {
      width: 10px; height: 10px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 12px #10b981;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(0.9); opacity:0.8; }
      50% { transform: scale(1.2); opacity:1; box-shadow: 0 0 20px #10b981; }
      100% { transform: scale(0.9); opacity:0.8; }
    }
    /* Chat */
    .chat-area {
      flex:1; overflow-y:auto; padding: 22px 24px;
      display:flex; flex-direction:column; gap:18px;
      scroll-behavior: smooth;
    }
    .message {
      display: flex; gap:10px;
      animation: msgSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes msgSlide {
      from { opacity:0; transform: translateY(15px) scale(0.98); }
      to { opacity:1; transform: translateY(0) scale(1); }
    }
    .message.user { justify-content: flex-end; }
    .message-bubble {
      max-width: 80%; padding: 14px 22px;
      border-radius: 24px; line-height: 1.6;
      font-size: 0.95rem; word-break: break-word;
      background: rgba(30, 27, 60, 0.8);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.08);
      color: #e2e8f0;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      transition: all 0.2s;
    }
    .message.user .message-bubble {
      background: linear-gradient(135deg, #6d28d9, #4c1d95);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      border-bottom-right-radius: 8px;
    }
    .message.assistant .message-bubble {
      border-left: 4px solid #8b5cf6;
      border-bottom-left-radius: 8px;
    }
    /* Buttons inside bubble */
    .action-btns {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;
    }
    .action-btn {
      background: rgba(124,58,237,0.2);
      border: 1px solid rgba(124,58,237,0.5);
      color: #c4b5fd;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem; font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
    .action-btn:hover {
      background: #7c3aed;
      color: white;
      box-shadow: 0 0 18px #7c3aed;
      transform: scale(1.05);
    }
    /* Input */
    .input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display:flex; gap:10px; align-items:flex-end;
    }
    .input-wrapper {
      flex:1; display:flex; align-items:flex-end;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      backdrop-filter: blur(12px);
      transition: 0.3s;
    }
    .input-wrapper:focus-within {
      border-color: #a78bfa;
      box-shadow: 0 0 18px rgba(139,92,246,0.5);
    }
    textarea {
      width:100%; background:transparent; border:none;
      padding: 14px 20px; resize:none;
      color:white; font-family: 'Inter', sans-serif;
      font-size: 0.95rem; outline:none;
      max-height:130px; min-height:48px;
    }
    .send-btn {
      background: #7c3aed;
      border:none; width:50px; height:50px;
      border-radius: 50%;
      display:flex; align-items:center; justify-content:center;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(124,58,237,0.6);
      transition: all 0.3s;
    }
    .send-btn:hover {
      background: #8b5cf6;
      transform: scale(1.07);
      box-shadow: 0 12px 28px #8b5cf6;
    }
    .send-btn svg { width:22px; height:22px; stroke:white; }
    /* Typing */
    .typing-wave {
      display:flex; gap:6px; padding:8px 0;
    }
    .typing-wave span {
      width:8px; height:8px; background:#a78bfa;
      border-radius:50%;
      animation: wave 1.2s infinite;
    }
    .typing-wave span:nth-child(2) { animation-delay:0.2s; }
    .typing-wave span:nth-child(3) { animation-delay:0.4s; }
    @keyframes wave {
      0%,60%,100% { transform:translateY(0); }
      30% { transform:translateY(-10px); }
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>
  <div class="app-container">
    <div class="header">
      <div class="brand">
        <div class="brand-icon">🧠</div>
        <h1>Mexa AI</h1>
      </div>
      <div class="status-pill">
        <span class="status-pulse"></span> Derin Analiz
      </div>
    </div>
    <div class="chat-area" id="chatArea">
      <div class="message assistant">
        <div class="message-bubble">
          👋 Merhaba! Ben <strong>Mexa AI</strong>. Bana bir link gönder, sitenin içine girelim, script.js'ini inceleyelim, hatta ekran görüntüsünü alalım. <br>🔗 <em>"https://ornek.com sitesini analiz et"</em>
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="userInput" rows="1" placeholder="Link yapıştır veya soru sor..."></textarea>
      </div>
      <button class="send-btn" id="sendBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/>
        </svg>
      </button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // === ARKA PLAN PARÇACIK ANİMASYONU ===
    (function() {
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');
      let particles = [];
      let w, h;
      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();
      class Particle {
        constructor() { this.reset(); }
        reset() {
          this.x = Math.random()*w;
          this.y = Math.random()*h;
          this.size = Math.random()*2.5+1;
          this.speedX = (Math.random()-0.5)*0.4;
          this.speedY = (Math.random()-0.5)*0.4;
          this.opacity = Math.random()*0.5+0.2;
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if(this.x<0||this.x>w||this.y<0||this.y>h) this.reset();
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
          ctx.fillStyle = `rgba(167,139,250,${this.opacity})`;
          ctx.fill();
        }
      }
      for(let i=0;i<120;i++) particles.push(new Particle());
      function animate() {
        ctx.clearRect(0,0,w,h);
        particles.forEach(p=>{ p.update(); p.draw(); });
        requestAnimationFrame(animate);
      }
      animate();
    })();

    // === UYGULAMA ===
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    userInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 130) + 'px';
    });

    function addMessage(role, content, extraActions = null) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      if (role === 'assistant') {
        bubble.innerHTML = marked.parse(content, { breaks: true });
      } else {
        bubble.textContent = content;
      }
      if (extraActions) {
        const btnContainer = document.createElement('div');
        btnContainer.className = 'action-btns';
        extraActions.forEach(action => {
          const btn = document.createElement('button');
          btn.className = 'action-btn';
          btn.textContent = action.label;
          btn.onclick = action.handler;
          btnContainer.appendChild(btn);
        });
        bubble.appendChild(btnContainer);
      }
      div.appendChild(bubble);
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
      return bubble;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.id = 'typingIndicator';
      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.innerHTML = '<div class="typing-wave"><span></span><span></span><span></span></div>';
      div.appendChild(bubble);
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function hideTyping() {
      document.getElementById('typingIndicator')?.remove();
    }

    async function callServer(endpoint, body) {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) {
        const err = await res.json().catch(()=>({error:'Bilinmeyen hata'}));
        throw new Error(err.error);
      }
      return res.json();
    }

    function extractUrl(text) {
      const match = text.match(/(https?:\/\/[^\s]+)/gi);
      return match ? match[0] : null;
    }

    async function sendMessage() {
      const raw = userInput.value.trim();
      if (!raw) return;
      addMessage('user', raw);
      userInput.value = '';
      userInput.style.height = 'auto';
      showTyping();

      try {
        const url = extractUrl(raw);
        if (url) {
          // 1) Site ana içeriğini getir
          const { content } = await callServer('/fetch-site', { url });
          // 2) DeepSeek'e özetlet
          const question = raw.replace(url, '').trim() || 'Bu web sitesini detaylı özetle, önemli noktaları listele.';
          const { reply } = await callServer('/ask-ai', {
            messages: [
              { role: 'system', content: 'Sen Mexa AI, siteleri analiz eden bir asistansın. Türkçe yanıt ver.' },
              { role: 'user', content: `SİTE İÇERİĞİ:\n"""\n${content}\n"""\n\nSORU: ${question}` }
            ]
          });
          hideTyping();
          // Gelişmiş inceleme butonları
          addMessage('assistant', reply, [
            { label: '🔍 Script.js dosyasını incele', handler: () => analyzeFile(url, '/script.js') },
            { label: '📸 Ekran görüntüsü al', handler: () => takeScreenshot(url) },
            { label: '📄 Style.css dosyasına bak', handler: () => analyzeFile(url, '/style.css') }
          ]);
        } else {
          // Normal sohbet
          const { reply } = await callServer('/ask-ai', {
            messages: [
              { role: 'system', content: 'Sen Mexa AI, yardımsever bir asistansın. Türkçe, samimi ve detaylı yanıt ver.' },
              { role: 'user', content: raw }
            ]
          });
          hideTyping();
          addMessage('assistant', reply);
        }
      } catch (err) {
        hideTyping();
        addMessage('assistant', `❌ Hata: ${err.message}`);
      }
    }

    async function analyzeFile(baseUrl, fileName) {
      const fileUrl = baseUrl.replace(/\/$/, '') + fileName;
      addMessage('user', `${fileName} dosyasını inceliyorum...`);
      showTyping();
      try {
        const { content, type } = await callServer('/fetch-file', { url: fileUrl });
        const { reply } = await callServer('/ask-ai', {
          messages: [
            { role: 'system', content: 'Sen bir kod analiz uzmanısın. Kullanıcıya dosyanın ne işe yaradığını, önemli kısımlarını anlat.' },
            { role: 'user', content: `Dosya adı: ${fileName}\nTür: ${type}\nİçerik:\n\`\`\`\n${content}\n\`\`\`\n\nBu dosyayı detaylıca analiz et, işlevini açıkla.` }
          ]
        });
        hideTyping();
        addMessage('assistant', `**📄 ${fileName} Analizi:**\n\n${reply}`);
      } catch (err) {
        hideTyping();
        addMessage('assistant', `❌ ${fileName} incelenemedi: ${err.message}`);
      }
    }

    async function takeScreenshot(url) {
      addMessage('user', '📸 Ekran görüntüsü alınıyor...');
      showTyping();
      try {
        const { screenshot } = await callServer('/screenshot', { url });
        hideTyping();
        addMessage('assistant', `İşte sitenin anlık görüntüsü:<br><img src="${screenshot}" style="max-width:100%; border-radius:16px; margin-top:10px; box-shadow:0 10px 30px rgba(0,0,0,0.5);" alt="Ekran görüntüsü"/>`);
      } catch (err) {
        hideTyping();
        addMessage('assistant', `⚠️ Ekran görüntüsü alınamadı (Puppeteer sunucuda kurulu olmayabilir): ${err.message}`);
      }
    }
  </script>
</body>
</html>
